<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>JVDI ASBL</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{font-family:Arial;background:#0b1d13;color:#fff;text-align:center}
input{padding:10px;margin:5px;width:80%}
button{padding:10px;background:#198754;color:#fff;border:none}
</style>
</head>

<body>

<h1>JVDI ASBL</h1>

<h2>Inscription</h2>

<input id="nom" placeholder="Nom"><br>
<input id="tel" placeholder="Téléphone"><br>
<input id="email" placeholder="Email"><br>

<button onclick="inscrire()">S'inscrire</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "jvdi---asbl.firebaseapp.com",
  projectId: "jvdi---asbl",
  storageBucket: "jvdi---asbl.appspot.com",
  messagingSenderId: "828367445344",
  appId: "1:828367445344:web:844b932c..."
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.inscrire = async function(){
let nom = document.getElementById("nom").value;
let tel = document.getElementById("tel").value;
let email = document.getElementById("email").value;

await addDoc(collection(db, "inscriptions"), {
nom, tel, email, date: new Date()
});

document.getElementById("msg").innerText = "Inscription envoyée ✅";
}

</script>

</body>
</html>
