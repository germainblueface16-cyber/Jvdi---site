<!DOCTYPE html>
<html>
<head>
  <title>Admin - Inscriptions</title>
</head>

<body style="background:green;color:white;font-family:Arial">

<h2>📊 Admin - Inscriptions</h2>

<table border="1" width="100%">
  <tr>
    <th>Nom</th>
    <th>Téléphone</th>
    <th>Email</th>
    <th>Code</th>
  </tr>
  <tbody id="liste"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjNSHWLpFDdIHX3HrH51cjeLm7I-jWKzY",
  authDomain: "jvdi---asbl-42f24.firebaseapp.com",
  projectId: "jvdi---asbl-42f24",
  storageBucket: "jvdi---asbl-42f24.appspot.com",
  messagingSenderId: "323584503979",
  appId: "1:323584503979:web:63668023ce90a0981a87ee"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function chargerInscriptions() {
  const querySnapshot = await getDocs(collection(db, "inscriptions"));
  const container = document.getElementById("liste");

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    container.innerHTML += `
      <tr>
        <td>${data.nom}</td>
        <td>${data.tel}</td>
        <td>${data.email}</td>
        <td>${data.code}</td>
      </tr>
    `;
  });
}

chargerInscriptions();

</script>

</body>
</html>
