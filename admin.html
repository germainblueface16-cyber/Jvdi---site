<!DOCTYPE html>
<html>
<head>
  <title>Admin JVDI</title>
  <style>
    body {font-family: Arial; background:#0b2e1e; color:white; padding:20px;}
    table {width:100%; border-collapse: collapse; margin-top:20px;}
    th, td {border:1px solid white; padding:10px; text-align:left;}
    th {background:#198754;}
  </style>
</head>
<body>

<h1>📊 Admin - Inscriptions</h1>

<table id="table">
  <tr>
    <th>Nom</th>
    <th>Téléphone</th>
    <th>Email</th>
    <th>Code</th>
  </tr>
</table>

<script>
let data = JSON.parse(localStorage.getItem("inscriptions")) || [];

let table = document.getElementById("table");

data.forEach(user => {
  let row = table.insertRow();
  row.insertCell(0).innerText = user.nom;
  row.insertCell(1).innerText = user.tel;
  row.insertCell(2).innerText = user.email;
  row.insertCell(3).innerText = user.code;
});
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "jvdi---asbl-42f24.firebaseapp.com",
  projectId: "jvdi---asbl-42f24",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function chargerInscriptions() {
  const querySnapshot = await getDocs(collection(db, "inscriptions"));
  const container = document.getElementById("liste");

  querySnapshot.forEach((doc) => {
    const data = doc.data();
    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <p><b>Nom:</b> ${data.nom}</p>
        <p><b>Téléphone:</b> ${data.tel}</p>
        <p><b>Email:</b> ${data.email}</p>
        <p><b>Code:</b> ${data.code}</p>
      </div>
    `;
  });
}
<div id="liste"></div>

<script type="module">
  chargerInscriptions();
</script>

</body>
</html>
